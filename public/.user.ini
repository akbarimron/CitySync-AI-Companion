; PHP configuration for CitySync AI Monitor
; This file is read by PHP-FPM/CGI when .htaccess doesn't work

; Upload limits for video analysis
upload_max_filesize = 500M
post_max_size = 512M
memory_limit = 512M
max_execution_time = 900

; For better file handling
file_uploads = On
default_charset = "UTF-8"
